    <line x1="60" y1="0" x2="60" y2="-40" stroke="#4a3028" stroke-width="3"/>
    <path d="M60 -40 L90 -25 L60 -10 Z" fill="#e8e0d0"/>
  </g>
  <g transform="translate(480, 240)">
    <ellipse cx="50" cy="30" rx="45" ry="18" fill="#6a5048"/>
    <rect x="20" y="15" width="60" height="20" fill="#7a6058" rx="3"/>
    <rect x="45" y="0" width="10" height="18" fill="#5a4038"/>
