  <text x="400" y="400" text-anchor="middle" fill="#fff" font-family="Georgia, serif" font-size="40" font-weight="700">Harbor</text>
  <text x="400" y="430" text-anchor="middle" fill="#c8e8ff" font-family="Georgia, serif" font-size="16">Aquarium · USS Constitution · Harborwalk</text>
