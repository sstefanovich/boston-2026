      <stop offset="0%" stop-color="#90c8f0"/>
      <stop offset="100%" stop-color="#2a5070"/>
    </linearGradient>
    <linearGradient id="hb-water" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4a90b8"/>
      <stop offset="100%" stop-color="#1a3a50"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#hb-sky)"/>
  <path d="M0 280 Q200 260 400 275 T800 265 L800 450 L0 450 Z" fill="url(#hb-water)"/>
  <g fill="#5a6878" transform="translate(0, 180)">
    <rect x="50" y="50" width="80" height="50"/><rect x="600" y="40" width="100" height="60"/>
    <rect x="200" y="60" width="60" height="40" opacity="0.7"/>
  </g>
  <g transform="translate(280, 220)">
