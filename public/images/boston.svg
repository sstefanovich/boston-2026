<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-label="Boston skyline with State House golden dome">
  <defs>
    <linearGradient id="bos-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7eb8e8"/>
      <stop offset="100%" stop-color="#1a3a5c"/>
    </linearGradient>
    <linearGradient id="bos-dome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f0d060"/>
      <stop offset="100%" stop-color="#c89820"/>
    </linearGradient>
  </defs>
  <rect width="800" height="450" fill="url(#bos-sky)"/>
  <rect y="320" width="800" height="130" fill="#2a3540"/>
  <g fill="#3a4858">
    <rect x="40" y="200" width="55" height="120"/><rect x="100" y="170" width="45" height="150"/>
    <rect x="150" y="220" width="60" height="100"/><rect x="580" y="190" width="50" height="130"/>
    <rect x="640" y="160" width="70" height="160"/><rect x="720" y="210" width="55" height="110"/>
    <rect x="500" y="180" width="40" height="140" opacity="0.8"/>
  </g>
  <g transform="translate(320, 95)">
    <rect x="-60" y="80" width="120" height="145" fill="#e8e4dc" stroke="#c0b8a8"/>
    <ellipse cx="0" cy="72" rx="38" ry="22" fill="url(#bos-dome)"/>
    <rect x="-8" y="40" width="16" height="35" fill="#d8c848"/>
    <circle cx="0" cy="32" r="12" fill="#e8c830"/>
    <rect x="-50" y="100" width="18" height="60" fill="#d8d4cc"/>
    <rect x="32" y="100" width="18" height="60" fill="#d8d4cc"/>
  </g>
  <path d="M0 310 Q200 295 400 305 T800 298 L800 450 L0 450 Z" fill="#1a4a6a" opacity="0.5"/>
  <text x="400" y="400" text-anchor="middle" fill="#fff" font-family="Georgia, serif" font-size="42" font-weight="700">Boston</text>
  <text x="400" y="430" text-anchor="middle" fill="#c8e0f8" font-family="Georgia, serif" font-size="16">State House · Downtown · Freedom Trail</text>
</svg>
